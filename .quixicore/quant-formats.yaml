schema_version: 0.1
backend: metal
formats:
  gguf:
    status: implemented
    notes: GGUF legacy, k-quant, and i-quant weight formats, including fused q4_0/q8_0/q6_K row gather and fp32 q4_0/q6_K decode paths.
  mx:
    status: implemented
    notes: MXFP8, MXFP6, MXFP4-style formats implemented in Metal software paths.
  fp8:
    status: implemented
    notes: fp8 weight, activation, and KV-cache paths.
  fp4:
    status: implemented
    notes: fp4/nvfp4-style software dequant and GEMM paths.
  bitnet:
    status: implemented
    notes: BitNet ternary weight paths.
  tq2_0:
    status: implemented
    notes: llama.cpp/GGUF native ternary TQ2_0 blocks for quantize/dequant, qgemm/qgemv, and quantized MoE paths.
  turboquant:
    status: implemented
    notes: TurboQuant KV codec and Hadamard/FWHT support.
status_values:
  - implemented
  - partial
  - experimental
  - planned
  - unsupported
notes: Format details should be expanded into operation-level coverage as the manifests become stricter.
