# Relocate the build directory OUT of the Xcode synchronized source tree.
#
# The Xcode project uses synchronized source groups. CMake emits per-object
# dependency files named "<kernel>.cpp.o.d"; Xcode classifies the ".d" extension
# as a DTrace script and can try to compile them when they sit inside a
# synchronized source tree. Building outside the source taxonomy keeps those
# files out of Xcode.
#
# Resolves (from bindings/python) to <repo-root>/build.
[build]
build_base = ../../build
