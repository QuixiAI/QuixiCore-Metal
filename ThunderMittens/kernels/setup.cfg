# Relocate the build directory OUT of the Xcode synchronized source tree.
#
# The Xcode project (ThunderMittens.xcodeproj) uses an Xcode-16 synchronized
# root group over ThunderMittens/, which auto-includes every file under it. CMake
# emits per-object dependency files named "<kernel>.cpp.o.d"; Xcode classifies the
# ".d" extension as a DTrace script and compiles each to "<kernel>.cpp.o.h". CMake
# writes two copies per kernel (the _ext and mlx_ext targets), so two commands
# produce the same .o.h -> "Multiple commands produce ..." and the Xcode build
# fails. Building outside the synchronized tree keeps those .d files out of it.
#
# Resolves (from ThunderMittens/kernels) to <repo-root>/build, i.e. outside the
# inner ThunderMittens/ folder that Xcode synchronizes. Always run the build from
# this directory: `cd ThunderMittens/kernels && ... python setup.py build_ext --inplace`.
[build]
build_base = ../../build
